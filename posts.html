<!DOCTYPE html>
<html lang="zh">
<head>

  <title>文章列表 | Cheng81446</title>
  <link rel="stylesheet" href="assets/css/style.min.css">
  <style>
    /* 卡片式文章列表样式 */
    .post-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }
    .post-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .post-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    .post-card h3 {
      margin-top: 0;
      color: #4a7c59;
    }
    .post-card p {
      font-size: 0.9rem;
      color: #555;
    }
    .post-card a {
      text-decoration: none;
      color: #4a7c59;
      font-weight: bold;
    }
    .post-card a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>文章列表</h1>
    <nav>
      <a href="index.html">首页</a>
    </nav>
  </header>

  <main>
    <section>

          <p>简述茶的起源与历史背景。</p>
        </div>
        <div class="post-card">
          <h3><a href="posts/tea-brewing.html">泡茶的艺术</a></h3>
          <p>简单介绍泡茶的步骤与美感。</p>
        </div>
        <div class="post-card">
  <h3><a href="posts/tea-reflection.html">茶文化随笔</a></h3>
  <p>分享茶文化的点滴与心得。</p>
</div>
      </div>
    </section>
  </main>

  <footer>

  </footer>
</body>
</html>
