<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheng · 茶与哲思</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, "Noto Serif SC", "Microsoft YaHei", serif;
            background: #f7f2eb; /* 老纸色底 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px -12px rgba(100, 70, 40, 0.15);
            padding: 48px 40px;
            max-width: 720px;
            width: 100%;
            text-align: center;
            border: 1px solid #ede6dc;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #d6c9b7; /* 茶汤色 */
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            color: #4a3728;
            border: 3px solid #fff3e6;
        }
        h1 {
            font-size: 30px;
            font-weight: 600;
            color: #3d2c1e;
            letter-spacing: 6px;
            margin-bottom: 6px;
        }
        .sub {
            font-size: 16px;
            color: #8b7355;
            letter-spacing: 4px;
            margin-bottom: 20px;
            font-style: italic;
        }
        .divider {
            width: 40px;
            height: 2px;
            background: #c9b6a2;
            margin: 16px auto;
        }
        .bio {
            color: #4d3a2a;
            line-height: 1.9;
            font-size: 15px;
            margin-bottom: 24px;
        }
        .bio strong {
            color: #7a5d41;
            font-weight: 600;
        }
        .quote {
            font-size: 14px;
            color: #8b7355;
            font-style: italic;
            border-top: 1px dashed #e0d5c8;
            padding-top: 18px;
            margin-bottom: 28px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .links a {
            display: block;
            padding: 12px 20px;
            background: #f4efe8;
            color: #3d2c1e;
            text-decoration: none;
            border-radius: 60px;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.25s;
            border: 1px solid transparent;
        }
        .links a:hover {
            background: #3d2c1e;
            color: #f7f2eb;
            border-color: #3d2c1e;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #b8a692;
            letter-spacing: 1px;
        }
        .footer span {
            display: inline-block;
            margin: 0 4px;
        }
        /* 新增样式：分类与短文列表 */
        .categories {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 12px 0 18px;
        }
        .tag {
            padding: 8px 14px;
            background: #fff3e6;
            border-radius: 20px;
            color: #3d2c1e;
            text-decoration: none;
            border: 1px solid #e9dccf;
            font-weight: 600;
            font-size: 14px;
        }
        .posts {
            text-align: left;
            margin-top: 18px;
        }
        .posts h3 {
            color: #3d2c1e;
            margin-bottom: 8px;
        }
        .post-list { 
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: #fbf7f2;
            border-radius: 12px;
            text-decoration: none;
            color: #3d2c1e;
            border: 1px solid #efe6dc;
        }
        .post-title {
            font-weight: 600;
        }
        .edit-link {
            font-size: 13px;
            color: #7a5d41;
            text-decoration: none;
            border: 1px dashed transparent;
            padding: 6px 8px;
            border-radius: 8px;
            background: #fff;
        }
        .edit-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <!-- 头像：可用茶壶或叶子 Emoji -->
        <div class="avatar">🍃</div>
        
        <!-- 名字（你的用户名） -->
        <h1>Cheng81446</h1>
        <div class="sub">· 茶 · 技 · 心 ·</div>
        
        <div class="divider"></div>
        
        <!-- 简介：茶与哲思 -->
        <div class="bio">
            我是 <strong>Cheng</strong>，一名在代码与茶汤之间游走的行者。<br>
            中国茶教会我 <strong>「静」</strong> —— 静观叶展，静听水沸，静待回甘。<br>
            在每一泡的起落间，照见 <strong>简朴之美</strong> 与 <strong>无常之思</strong>。
        </div>
        
        <!-- 一句哲思引用 -->
        <div class="quote">
            "茶不过两种姿态：浮、沉；<br>
            饮茶人不过两种姿势：拿起、放下。"
        </div>
        
        <!-- 分类（Tag） -->
        <div class="categories">
            <a class="tag" href="tea-reflection.md" target="_blank">🍵 茶事隨筆</a>
            <!-- 如果将来有更多分类，可以在此添加 -->
        </div>

        <!-- 社交链接：保留 GitHub，可增加茶相关 -->
        <div class="links">
            <a href="https://github.com/Cheng81446" target="_blank">🐙 我的 GitHub 代码库</a>
            <a href="tea-reflection.md" target="_blank">🍵 茶事随笔（页面）</a>
        </div>
        
        <!-- 短文展示区域：会从 display-post 目录读取列表 -->
        <div class="posts">
            <h3>短文 / Display Posts</h3>
            <div id="short-posts">正在加载短文…</div>
        </div>

        <div class="footer">
            <span>☕</span> 以茶养心 · 以码修身 <span>☕</span>
        </div>
    </div>

    <script>
        // 读取仓库中 display-post 目录的文件并展示（公开仓库无需 token）
        (function(){
            const owner = 'Cheng81446';
            const repo = 'Cheng81446.github.io';
            const path = 'display-post';
            const container = document.getElementById('short-posts');

            fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`)
            .then(res => {
                if (res.status === 404) throw new Error('目录不存在');
                return res.json();
            })
            .then(files => {
                if (!Array.isArray(files)) {
                    container.innerHTML = '<p>无法读取 display-post 目录内容。</p>';
                    return;
                }
                const mdFiles = files.filter(f => f.type === 'file' && /\.(md|markdown|html)$/i.test(f.name));
                if (mdFiles.length === 0) {
                    container.innerHTML = '<p>display-post 目录目前没有短文。你可以通过 GitHub 在 display-post/ 下添加 .md 文件来发布短文。</p>';
                    return;
                }
                mdFiles.sort((a,b)=>b.name.localeCompare(a.name));
                const list = document.createElement('div');
                list.className = 'post-list';
                mdFiles.forEach(f => {
                    const nameNoExt = f.name.replace(/\.(md|markdown|html)$/i, '');
                    // 站点上可能会把 markdown 渲染为 /display-post/<slug>.html 或 /display-post/<slug>/，
                    // 我们使用相对路径 /display-post/{slug} 作为链接，若无法访问可改为直接打开 GitHub 编辑页面。
                    const slug = encodeURIComponent(nameNoExt);
                    const postUrl = `/${path}/${slug}`;
                    const editUrl = `https://github.com/${owner}/${repo}/edit/main/${path}/${encodeURIComponent(f.name)}`;

                    const a = document.createElement('a');
                    a.className = 'post-item';
                    a.href = postUrl;
                    a.target = '_blank';
                    a.rel = 'noopener';
                    a.innerHTML = `<div class="post-title">${nameNoExt.replace(/-/g,' ')}</div><div><a class="edit-link" href="${editUrl}" target="_blank">编辑</a></div>`;
                    list.appendChild(a);
                });
                container.innerHTML = '';
                container.appendChild(list);
            })
            .catch(err => {
                container.innerHTML = `<p>读取短文失败：${err.message}</p>`;
            });
        })();
    </script>
</body>
</html>
