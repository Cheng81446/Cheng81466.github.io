      <h2>简单的泡茶步骤</h2>
      <p>泡茶不仅是饮品制作，更是一种生活美学。以下是简化的步骤：</p>
      <ol>
        <li>准备茶具：茶壶或盖碗，茶杯。</li>
        <li>放入茶叶：适量茶叶即可。</li>
        <li>注入热水：水温因茶而异，绿茶用较低温度，红茶用较高温度。</li>
        <li>静置片刻：让茶叶舒展，释放香气。</li>
        <li>倒出茶汤：慢慢品味茶香。</li>
      </ol>

      <h2>泡茶的美感</h2>
      <p>在泡茶过程中，注重心境与环境。安静的氛围、清新的茶香，让人放松身心。</p>
